# nginx site pro variantcheckers.com — produkční doména projektu (dřív dama.softcode.cz).
#
# Statická Vite SPA z packages/web/dist + reverzní proxy /games… a /room… na backend
# (fastify, systemd služba dama-server, 127.0.0.1:3000). Cesta k rootu zůstává
# /var/www/dama.softcode.cz — přejmenovává se doména, ne adresář ani služba.
#
# TLS: doména jede za Cloudflare proxy (oranžový mráček) v SSL modu Full (strict).
# Certifikát NENÍ z Let's Encrypt, ale Cloudflare Origin Certificate (platnost 15 let,
# obnovu neřeší certbot). Šifruje jen úsek Cloudflare → origin; CF Origin CA není
# v důvěryhodných CA prohlížečů, takže přímý přístup na IP nebo s vypnutou proxy
# skončí chybou certifikátu. To je očekávané — provoz musí téct přes CF.
#
# Cert se generuje v CF dashboardu: SSL/TLS → Origin Server → Create Certificate
# (nech zahrnout variantcheckers.com i *.variantcheckers.com) a ukládá se do:
#   /etc/ssl/cloudflare/variantcheckers.com.pem   (certificate, 644)
#   /etc/ssl/cloudflare/variantcheckers.com.key   (private key, 600, root:root)
#
# Prefix `dama_` u mapy je čitelnost, ne nutnost: nginx duplicitní `map` téhož jména
# NEodmítá (proměnná je CHANGEABLE, vyhrává poslední definice) — ověřeno `nginx -t`
# na 1.28.3. Díky tomu můžou dama.softcode.cz i tento site běžet vedle sebe.
#
# PvP jede přes WebSockety (fáze 66+): partie `/games/:id/ws` a společná místnost
# `/room/ws`. Upgrade na WS vyžaduje přeposlání hlaviček Upgrade/Connection.
map $http_upgrade $dama_connection_upgrade {
    default upgrade;
    ''      close;
}

# Port 80: přesměrování na HTTPS pro apex i www. Ve Full (strict) sem Cloudflare běžně
# vůbec nesahá (chodí rovnou na :443) — blok je pro přímé HTTP požadavky na origin.
server {
    listen 80;
    listen [::]:80;
    server_name variantcheckers.com www.variantcheckers.com;

    return 301 https://variantcheckers.com$request_uri;
}

# www → apex. Kanonická adresa je apex; www jen přesměrovává se zachováním cesty.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.variantcheckers.com;

    ssl_certificate     /etc/ssl/cloudflare/variantcheckers.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/variantcheckers.com.key;

    return 301 https://variantcheckers.com$request_uri;
}

# Vlastní aplikace.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name variantcheckers.com;

    ssl_certificate     /etc/ssl/cloudflare/variantcheckers.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/variantcheckers.com.key;

    root /var/www/dama.softcode.cz/packages/web/dist;
    index index.html;

    # API backendu: fastify na loopbacku. Musí být PŘED location / , ať se
    # /games nechytne do SPA fallbacku. Hlavičky Upgrade/Connection kvůli
    # WS odběru stavu partie (`/games/:id/ws`); u REST požadavků je
    # $http_upgrade prázdný → Connection: close, běžné proxování.
    location /games {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $dama_connection_upgrade;
        # WS spojení místnosti/partie je dlouhé a mezi tahy tiché – ať ho
        # nginx neshodí na výchozím 60s read timeoutu. Pozor: Cloudflare má
        # vlastní strop na tichý WS (~100s), proto klient posílá ping.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Společná místnost PvP: jediná WS route `/room/ws` (párování výzvami,
    # presence, signály remíza/odveta). Musí být PŘED location / , jinak by
    # spadla do SPA fallbacku a vrátila index.html místo upgrade na WS.
    location /room {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $dama_connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Hashované assety (index-XXXX.js/.css, obrázky, zvuky) — dlouhá immutable cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: neexistující cesty spadnou na index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pozn.: bez ngx_http_realip_module s rozsahy Cloudflare je v logu IP CF, ne hráče.
    # Backend klientskou IP nepoužívá, takže je to jen kosmetika logů.
    access_log /var/log/nginx/variantcheckers.com_access.log;
    error_log  /var/log/nginx/variantcheckers.com_error.log;
}
