# nginx site pro dama.softcode.cz — JEN přesměrování na variantcheckers.com.
#
# Aplikace se přestěhovala na variantcheckers.com (viz scripts/nginx-variantcheckers.com.conf).
# Tento site už nic neservíruje, jen trvale (301) posílá dál se zachováním cesty:
#   https://dama.softcode.cz/foo?a=1  →  https://variantcheckers.com/foo?a=1
#
# Certifikát pro dama.softcode.cz se musí dál obnovovat — bez něj by HTTPS požadavky
# skončily chybou certifikátu DŘÍV, než se prohlížeč k přesměrování vůbec dostane.
#
# Renewal přes tento `return 301` projde, ale NE proto, že by location měla přednost —
# server-level `return` se vyhodnotí v rewrite fázi, tedy dřív, než se location vůbec
# vybírá, a challenge by zabil. Certbot nginx plugin proto vkládá na ZAČÁTEK server bloku
# `rewrite ^(/.well-known/acme-challenge/.*) $1 break;` (http_01.py, insert_at_top=True),
# což zpracování rewrite modulu — včetně `return 301` níže — zastaví. Modifikuje i 443
# blok. Po změně configu ověř: `certbot renew --cert-name dama.softcode.cz --dry-run`.
#
# Mapa $dama_connection_upgrade tu ZÁMĚRNĚ není — přesměrování žádné WS neproxuje.
# Žije v nginx-variantcheckers.com.conf, kde je potřeba.

server {
    listen 80;
    listen [::]:80;
    server_name dama.softcode.cz;

    return 301 https://variantcheckers.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dama.softcode.cz;

    ssl_certificate /etc/letsencrypt/live/dama.softcode.cz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dama.softcode.cz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://variantcheckers.com$request_uri;

    access_log /var/log/nginx/dama.softcode.cz_access.log;
    error_log  /var/log/nginx/dama.softcode.cz_error.log;
}
