# nginx site pro dama.softcode.cz
#
# Statická Vite SPA z packages/web/dist + reverzní proxy /games… na backend
# (fastify, systemd služba dama-server, 127.0.0.1:3000).
#
# Toto je HTTP-only výchozí stav. `certbot --nginx -d dama.softcode.cz` si sem
# sám doplní 443 blok se SSL a přesměrování z portu 80 (jako u prsi.softcode.cz).

server {
    listen 80;
    listen [::]:80;
    server_name dama.softcode.cz;

    root /var/www/dama.softcode.cz/packages/web/dist;
    index index.html;

    # API backendu: fastify na loopbacku. Musí být PŘED location / , ať se
    # /games nechytne do SPA fallbacku.
    location /games {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashované assety (index-XXXX.js/.css, obrázky, zvuky) — dlouhá immutable cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: neexistující cesty spadnou na index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/dama.softcode.cz_access.log;
    error_log  /var/log/nginx/dama.softcode.cz_error.log;
}
